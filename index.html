<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walmart Location Profiler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root { --bg:#0c0f14; --card:#151921; --border:#1e2736; --text:#e8edf5; --muted:#7b8ba5; --accent:#22d3ee; --accent2:#a78bfa; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.header-inner{max-width:1100px;margin:0 auto}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.header p{font-size:12px;color:var(--muted);margin:4px 0 16px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select{background:#1e293b;color:var(--text);border:1px solid #334155;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;min-width:280px;outline:none;font-family:inherit}
select.compare{min-width:200px;color:var(--muted)} select.compare.active{color:var(--accent2)}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-top:16px}
.tab-btn{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:inherit}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.stat-card{background:var(--card);border-radius:10px;padding:14px 18px;min-width:120px;flex:1;border:1px solid var(--border)}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat-card .value{font-size:22px;font-weight:700;color:var(--text);margin-top:2px}
.section-title{font-size:15px;font-weight:700;margin:28px 0 12px;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px}
.chart-box{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 14px}
.pill{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.pill.active{background:var(--accent);color:#0c0f14;border-color:var(--accent);font-weight:600}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table thead th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;border-bottom:1px solid var(--border)}
.data-table tbody td{padding:8px 12px;border-bottom:1px solid #1a2030}
.cat-label{color:var(--accent);font-size:10px;margin-right:6px}
.pen-bar{display:flex;align-items:center;gap:6px}
.pen-bar-track{width:60px;height:6px;background:#1e2736;border-radius:3px;overflow:hidden}
.pen-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.score-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.score-high{background:#0f766e;color:#fff} .score-mid{background:#92400e;color:#fff} .score-low{background:#1e293b;color:var(--muted)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.cat-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px 16px}
.cat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-card-header span:first-child{font-weight:600;font-size:13px}
.cat-card-meta{font-size:11px;color:var(--muted);margin-bottom:6px}
.cat-bar-track{width:100%;height:4px;background:#1e2736;border-radius:2px}
.cat-bar-fill{height:100%;border-radius:2px}
.tab-content{display:none} .tab-content.active{display:block} .spacer{height:60px}
.legend{display:flex;gap:20px;justify-content:center;margin-top:8px;font-size:12px}
.legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}select{min-width:100%!important}.stats-row{flex-direction:column}}
</style>
</head>

const storeKeys = Object.keys(DATA.stores);
const CAT_COLORS = ['#0f766e','#be185d','#7c3aed','#c2410c','#0369a1','#4338ca','#a16207','#15803d','#9333ea','#dc2626','#059669','#6366f1','#d97706','#0891b2','#e11d48','#7e22ce','#ea580c','#0284c7','#4f46e5','#ca8a04','#16a34a','#8b5cf6','#ef4444','#14b8a6','#ec4899'];
const GEN_COLORS = ['#0f766e','#7c3aed','#c2410c','#64748b'];
const fmt = n => n != null ? n.toLocaleString() : '—';
const fmtMoney = n => n ? '$'+n.toLocaleString() : '—';
let currentStore = storeKeys[0], compareStoreKey = null, currentTab = 'overview', catFilter = 'all', charts = {};
Chart.defaults.color = '#7b8ba5'; Chart.defaults.borderColor = '#1e2736';
Chart.defaults.font.family = "'DM Sans',system-ui,sans-serif"; Chart.defaults.font.size = 11;

const storeSelect = document.getElementById('storeSelect');
const compareSelect = document.getElementById('compareSelect');
storeKeys.forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = DATA.stores[k].label; storeSelect.appendChild(o); });
function updateCompareOptions() {
  compareSelect.innerHTML = '<option value="">Compare with…</option>';
  storeKeys.filter(k => k !== currentStore).forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = DATA.stores[k].short_label; compareSelect.appendChild(o); });
}
updateCompareOptions();
storeSelect.addEventListener('change', e => { currentStore = e.target.value; catFilter = 'all'; updateCompareOptions(); render(); });
compareSelect.addEventListener('change', e => { compareStoreKey = e.target.value || null; compareSelect.classList.toggle('active', !!compareStoreKey); render(); });
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-'+currentTab).classList.add('active');
    render();
  });
});
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
const ttStyle = { backgroundColor:'#151921', borderColor:'#1e2736', borderWidth:1, titleColor:'#e8edf5', bodyColor:'#7b8ba5' };

function render() {
  const store = DATA.stores[currentStore];
  const topics = DATA.topics_by_store[currentStore] || [];
  const categories = DATA.categories_by_store[currentStore] || [];

  document.getElementById('statsRow').innerHTML = [
    ['Households',fmt(store.total_hh)],['Median Income',fmtMoney(store.median_income)],
    ['Median Age',store.median_age],['% Married',store.pct_married+'%'],['% w/ Children',store.pct_children+'%']
  ].map(([l,v]) => '<div class="stat-card"><div class="label">'+l+'</div><div class="value">'+v+'</div></div>').join('');

  // Generational doughnut
  destroyChart('gen');
  const ge = Object.entries(store.generations), gt = ge.reduce((s,[,v])=>s+v,0);
  charts.gen = new Chart(document.getElementById('genChart'), { type:'doughnut', data:{
    labels:ge.map(([k])=>k), datasets:[{data:ge.map(([,v])=>v),backgroundColor:GEN_COLORS,borderColor:'#151921',borderWidth:2}]
  }, options:{ responsive:true, maintainAspectRatio:true, aspectRatio:2, plugins:{
    legend:{position:'right',labels:{padding:12,usePointStyle:true,pointStyle:'rectRounded',
      generateLabels:c=>c.data.labels.map((l,i)=>({text:l+' '+Math.round(c.data.datasets[0].data[i]/gt*100)+'%',fillStyle:GEN_COLORS[i],strokeStyle:'#151921',lineWidth:2,index:i}))}},
    tooltip:ttStyle}}});

  // Reading bars
  destroyChart('reading');
  const re = Object.entries(store.reading).filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1]);
  charts.reading = new Chart(document.getElementById('readingChart'), { type:'bar', data:{
    labels:re.map(([k])=>k), datasets:[{data:re.map(([,v])=>v),backgroundColor:'#22d3ee',borderRadius:4,barThickness:18}]
  }, options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, aspectRatio:2,
    scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'#1e2736'}},y:{grid:{display:false}}},
    plugins:{legend:{display:false},tooltip:{...ttStyle,callbacks:{label:ctx=>ctx.parsed.x+'% of HH'}}}}});

  // Radar
  destroyChart('radar');
  const rk=["Sports & Fitness","Food & Beverage","Consumer Electronics","Travel","News","Arts & Entertainment","Gifting & Occasions","Babies & Children"];
  const rl=rk.map(k=>k.length>16?k.slice(0,14)+'…':k);
  const rd=rk.map(k=>{const c=categories.find(x=>x.category===k);return c?c.penetration:0;});
  const ds=[{label:store.short_label,data:rd,backgroundColor:'rgba(34,211,238,0.15)',borderColor:'#22d3ee',borderWidth:2,pointBackgroundColor:'#22d3ee'}];
  const leg=document.getElementById('radarLegend');
  if(compareStoreKey){
    const cs=DATA.stores[compareStoreKey],cc=DATA.categories_by_store[compareStoreKey]||[];
    ds.push({label:cs.short_label,data:rk.map(k=>{const c=cc.find(x=>x.category===k);return c?c.penetration:0;}),backgroundColor:'rgba(167,139,250,0.1)',borderColor:'#a78bfa',borderWidth:2,pointBackgroundColor:'#a78bfa'});
    document.getElementById('radarTitle').innerHTML='<span>🎯</span> Category Penetration — Comparison';
    leg.style.display='flex';leg.innerHTML='<span><span class="legend-dot" style="background:#22d3ee"></span>'+store.short_label+'</span><span><span class="legend-dot" style="background:#a78bfa"></span>'+cs.short_label+'</span>';
  } else { document.getElementById('radarTitle').innerHTML='<span>🎯</span> Category Penetration'; leg.style.display='none'; }
  charts.radar = new Chart(document.getElementById('radarChart'), { type:'radar', data:{labels:rl,datasets:ds}, options:{
    responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
    scales:{r:{beginAtZero:true,ticks:{callback:v=>v+'%',backdropColor:'transparent'},grid:{color:'#1e2736'},angleLines:{color:'#1e2736'},pointLabels:{font:{size:10}}}},
    plugins:{legend:{display:false},tooltip:{...ttStyle,callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.r+'%'}}}}});

  // Top 10
  destroyChart('topics10');
  const t10=topics.slice(0,10).reverse();
  charts.topics10 = new Chart(document.getElementById('topicsChart'), { type:'bar', data:{
    labels:t10.map(t=>t.topic.length>30?t.topic.slice(0,28)+'…':t.topic),
    datasets:[{data:t10.map(t=>t.penetration),backgroundColor:t10.map((_,i)=>CAT_COLORS[(9-i)%CAT_COLORS.length]),borderRadius:4,barThickness:22}]
  }, options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, aspectRatio:2.2,
    scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'#1e2736'}},y:{grid:{display:false},ticks:{font:{size:11}}}},
    plugins:{legend:{display:false},tooltip:{...ttStyle,callbacks:{label:ctx=>'Penetration: '+ctx.parsed.x+'%'}}}}});

  // Topics table
  const uc=[...new Set(topics.map(t=>t.category))].sort();
  const fp=document.getElementById('catFilters');
  fp.innerHTML='<button class="pill '+(catFilter==='all'?'active':'')+'" data-cat="all">All</button>'+uc.map(c=>'<button class="pill '+(catFilter===c?'active':'')+'" data-cat="'+c+'">'+c+'</button>').join('');
  fp.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>{catFilter=b.dataset.cat;render();}));
  const ft=catFilter==='all'?topics:topics.filter(t=>t.category===catFilter);
  document.getElementById('topicTHead').innerHTML='<tr>'+['#','Topic','Consumers','Penetration','Engagement','Freq (30d)','Recency','Score'].map(h=>'<th>'+h+'</th>').join('')+'</tr>';
  document.getElementById('topicTBody').innerHTML=ft.map((t,i)=>'<tr><td style="color:var(--muted);font-size:11px">'+(i+1)+'</td><td style="font-weight:500"><span class="cat-label">'+t.category+'</span>'+t.subcategory+'</td><td>'+fmt(t.consumers)+'</td><td><div class="pen-bar"><div class="pen-bar-track"><div class="pen-bar-fill" style="width:'+Math.min(t.penetration,100)+'%"></div></div><span>'+t.penetration+'%</span></div></td><td>'+t.avg_engagement.toFixed(3)+'</td><td>'+t.avg_frequency.toFixed(1)+'</td><td>'+t.avg_recency.toFixed(1)+'d</td><td><span class="score-badge '+(t.composite>0.7?'score-high':t.composite>0.5?'score-mid':'score-low')+'">'+t.composite.toFixed(3)+'</span></td></tr>').join('');

  // Category bar chart
  destroyChart('catBar');
  const tc=categories.slice(0,12).reverse();
  charts.catBar = new Chart(document.getElementById('catBarChart'), { type:'bar', data:{
    labels:tc.map(c=>c.category),datasets:[{data:tc.map(c=>c.penetration),backgroundColor:tc.map((_,i)=>CAT_COLORS[(11-i)%CAT_COLORS.length]),borderRadius:4,barThickness:24}]
  }, options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, aspectRatio:1.8,
    scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'#1e2736'}},y:{grid:{display:false}}},
    plugins:{legend:{display:false},tooltip:{...ttStyle,callbacks:{label:ctx=>'Penetration: '+ctx.parsed.x+'%'}}}}});

  document.getElementById('catGrid').innerHTML=categories.map((c,i)=>'<div class="cat-card"><div class="cat-card-header"><span>'+c.category+'</span><span class="score-badge '+(c.penetration>30?'score-high':c.penetration>15?'score-mid':'score-low')+'">'+c.penetration+'%</span></div><div class="cat-card-meta">'+fmt(c.consumers)+' consumers · '+c.subcats+' subcategories · Eng: '+c.avg_engagement.toFixed(3)+'</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:'+Math.min(c.penetration,100)+'%;background:'+CAT_COLORS[i%CAT_COLORS.length]+'"></div></div></div>').join('');
}
render();
</script>
