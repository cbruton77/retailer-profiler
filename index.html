  <div style={{ background: "var(--card)", borderRadius: 10, padding: "14px 18px", minWidth: 120, flex: 1, border: "1px solid var(--border)" }}>

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 12px", boxShadow: "0 4px 12px rgba(0,0,0,0.15)", fontSize: 12, color: "var(--text)" }}>
      <div style={{ fontWeight: 600, marginBottom: 4 }}>{label || payload[0]?.payload?.name || payload[0]?.payload?.category}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color || "var(--muted)" }}>
          {p.name}: {typeof p.value === "number" ? (p.value % 1 ? p.value.toFixed(1) : p.value.toLocaleString()) : p.value}{p.unit || ""}

      ))}
    </div>
  );
};

function App() {
  const [selectedStore, setSelectedStore] = useState(storeKeys[0]);
  const [tab, setTab] = useState("overview");
  const [catFilter, setCatFilter] = useState("all");
  const [compareStore, setCompareStore] = useState(null);

  const store = DATA.stores[selectedStore];
  const topics = DATA.topics_by_store[selectedStore] || [];
  const categories = DATA.categories_by_store[selectedStore] || [];

  const genData = useMemo(() => {
    const g = store.generations;
    const total = Object.values(g).reduce((a, b) => a + b, 0);
    return Object.entries(g).map(([name, val]) => ({ name, value: val, pct: total ? Math.round(val / total * 100) : 0 }));
  }, [selectedStore]);

  const topCats = useMemo(() => categories.slice(0, 12), [selectedStore]);

  const radarData = useMemo(() => {
    const keys = ["Sports & Fitness", "Food & Beverage", "Consumer Electronics", "Travel", "News", "Arts & Entertainment", "Gifting & Occasions", "Babies & Children"];
    return keys.map(k => {
      const c = categories.find(c => c.category === k);
      const row = { category: k.length > 16 ? k.slice(0, 14) + "…" : k, fullName: k };
      row[store.short_label] = c?.penetration || 0;
      if (compareStore) {
        const cs = DATA.stores[compareStore];
        const cc = (DATA.categories_by_store[compareStore] || []).find(c2 => c2.category === k);
        row[cs.short_label] = cc?.penetration || 0;
      }
      return row;
    });
  }, [selectedStore, compareStore]);

  const filteredTopics = useMemo(() => {
    if (catFilter === "all") return topics;
    return topics.filter(t => t.category === catFilter);
  }, [topics, catFilter]);

  const uniqueCats = useMemo(() => [...new Set(topics.map(t => t.category))].sort(), [topics]);

  const readingData = useMemo(() =>
    Object.entries(store.reading).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).map(([k, v]) => ({ name: k, value: v })),
    [selectedStore]
  );

  const GEN_COLORS = ["#0f766e", "#7c3aed", "#c2410c", "#64748b"];

  return (
    <div style={{
      "--bg": "#0c0f14", "--card": "#151921", "--border": "#1e2736", "--text": "#e8edf5",
      "--muted": "#7b8ba5", "--accent": "#22d3ee", "--accent2": "#a78bfa", "--accent3": "#f472b6",
      fontFamily: "'DM Sans', system-ui, sans-serif", background: "var(--bg)", color: "var(--text)",
      minHeight: "100vh", padding: 0, lineHeight: 1.5
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%)", padding: "28px 24px 20px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <span style={{ fontSize: 22 }}>📊</span>
            <h1 style={{ fontSize: 20, fontWeight: 700, margin: 0, letterSpacing: -0.5 }}>Walmart Location Profiler</h1>
          </div>
          <p style={{ fontSize: 12, color: "var(--muted)", margin: "4px 0 16px" }}>Consumer demographics & magazine interest intelligence by trade area</p>

          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <select
              value={selectedStore}
              onChange={(e) => { setSelectedStore(e.target.value); setCatFilter("all"); }}
              style={{
                background: "#1e293b", color: "var(--text)", border: "1px solid #334155",
                borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 500, cursor: "pointer",
                minWidth: 280, outline: "none"
              }}
            >
              {storeKeys.map(k => (
                <option key={k} value={k}>{DATA.stores[k].label}</option>
              ))}
            </select>
            <select
              value={compareStore || ""}
              onChange={(e) => setCompareStore(e.target.value || null)}
              style={{
                background: "#1e293b", color: compareStore ? "var(--accent2)" : "var(--muted)", border: "1px solid #334155",
                borderRadius: 8, padding: "8px 14px", fontSize: 13, cursor: "pointer", minWidth: 200, outline: "none"
              }}
            >
              <option value="">Compare with…</option>
              {storeKeys.filter(k => k !== selectedStore).map(k => (
                <option key={k} value={k}>{DATA.stores[k].short_label}</option>
              ))}
            </select>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px" }}>
        <div style={{ display: "flex", gap: 0, borderBottom: "1px solid var(--border)", marginTop: 16 }}>
          {[["overview", "Overview"], ["topics", "Topic Rankings"], ["categories", "Category Breakdown"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{
              background: "none", border: "none", color: tab === id ? "var(--accent)" : "var(--muted)",
              fontSize: 13, fontWeight: 600, padding: "10px 18px", cursor: "pointer",
              borderBottom: tab === id ? "2px solid var(--accent)" : "2px solid transparent",
              transition: "all 0.2s", fontFamily: "inherit"
            }}>{label}</button>
          ))}
        </div>

        {/* OVERVIEW TAB */}
        {tab === "overview" && (
          <div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 20 }}>
              <StatCard label="Households" value={fmt(store.total_hh)} />
              <StatCard label="Median Income" value={fmtMoney(store.median_income)} />
              <StatCard label="Median Age" value={store.median_age} />
              <StatCard label="% Married" value={store.pct_married + "%"} />
              <StatCard label="% w/ Children" value={store.pct_children + "%"} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginTop: 8 }}>
              {/* Generational Mix */}
              <div>
                <SectionTitle icon="👥">Generational Mix</SectionTitle>
                <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", padding: 16 }}>
                  <ResponsiveContainer width="100%" height={200}>
                    <PieChart>
                      <Pie data={genData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={75} innerRadius={40} paddingAngle={3} label={({ name, pct }) => `${name} ${pct}%`} style={{ fontSize: 10 }}>
                        {genData.map((_, i) => <Cell key={i} fill={GEN_COLORS[i % GEN_COLORS.length]} />)}
                      </Pie>
                      <Tooltip content={<CustomTooltip />} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Reading Affinities */}
              <div>
                <SectionTitle icon="📖">Reading Affinities</SectionTitle>
                <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", padding: 16 }}>
                  <ResponsiveContainer width="100%" height={200}>
                    <BarChart data={readingData} layout="vertical" margin={{ left: 90, right: 20, top: 5, bottom: 5 }}>
                      <XAxis type="number" tick={{ fill: "var(--muted)", fontSize: 10 }} tickFormatter={v => v + "%"} />
                      <YAxis type="category" dataKey="name" tick={{ fill: "var(--text)", fontSize: 11 }} width={85} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="value" name="% of HH" radius={[0, 4, 4, 0]} fill="#22d3ee" />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Radar Comparison */}
            <SectionTitle icon="🎯">Category Penetration {compareStore ? "— Comparison" : ""}</SectionTitle>
            <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", padding: 16 }}>
              <ResponsiveContainer width="100%" height={340}>
                <RadarChart data={radarData} cx="50%" cy="50%" outerRadius="72%">
                  <PolarGrid stroke="#1e2736" />
                  <PolarAngleAxis dataKey="category" tick={{ fill: "var(--muted)", fontSize: 10 }} />
                  <PolarRadiusAxis tick={{ fill: "var(--muted)", fontSize: 9 }} tickFormatter={v => v + "%"} />
                  <Radar name={store.short_label} dataKey={store.short_label} stroke="#22d3ee" fill="#22d3ee" fillOpacity={0.2} strokeWidth={2} />
                  {compareStore && (
                    <Radar name={DATA.stores[compareStore].short_label} dataKey={DATA.stores[compareStore].short_label} stroke="#a78bfa" fill="#a78bfa" fillOpacity={0.15} strokeWidth={2} />
                  )}
                  <Tooltip content={<CustomTooltip />} />
                </RadarChart>
              </ResponsiveContainer>
              {compareStore && (
                <div style={{ display: "flex", gap: 20, justifyContent: "center", marginTop: 8, fontSize: 12 }}>
                  <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "#22d3ee", marginRight: 6, verticalAlign: -1 }} />{store.short_label}</span>
                  <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "#a78bfa", marginRight: 6, verticalAlign: -1 }} />{DATA.stores[compareStore].short_label}</span>
                </div>
              )}
            </div>

            {/* Top 10 Topics */}
            <SectionTitle icon="🔥">Top 10 Consumer Interests</SectionTitle>
            <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", padding: 16 }}>
              <ResponsiveContainer width="100%" height={320}>
                <BarChart data={topics.slice(0, 10)} layout="vertical" margin={{ left: 180, right: 30, top: 5, bottom: 5 }}>
                  <XAxis type="number" tick={{ fill: "var(--muted)", fontSize: 10 }} tickFormatter={v => v + "%"} />
                  <YAxis type="category" dataKey="topic" tick={{ fill: "var(--text)", fontSize: 11 }} width={175} tickFormatter={v => v.length > 28 ? v.slice(0, 26) + "…" : v} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="penetration" name="Penetration %" radius={[0, 6, 6, 0]}>
                    {topics.slice(0, 10).map((t, i) => <Cell key={i} fill={CAT_COLORS[i % CAT_COLORS.length]} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}

        {/* TOPICS TAB */}
        {tab === "topics" && (
          <div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", margin: "18px 0 14px" }}>
              <button onClick={() => setCatFilter("all")} style={{
                background: catFilter === "all" ? "#22d3ee" : "var(--card)", color: catFilter === "all" ? "#0c0f14" : "var(--muted)",
                border: "1px solid " + (catFilter === "all" ? "#22d3ee" : "var(--border)"), borderRadius: 20,
                padding: "5px 14px", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
              }}>All</button>
              {uniqueCats.map(c => (
                <button key={c} onClick={() => setCatFilter(c)} style={{
                  background: catFilter === c ? "#22d3ee" : "var(--card)", color: catFilter === c ? "#0c0f14" : "var(--muted)",
                  border: "1px solid " + (catFilter === c ? "#22d3ee" : "var(--border)"), borderRadius: 20,
                  padding: "5px 14px", fontSize: 11, fontWeight: 500, cursor: "pointer", fontFamily: "inherit",
                  whiteSpace: "nowrap"
                }}>{c}</button>
              ))}
            </div>

            <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", overflow: "hidden" }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ borderBottom: "1px solid var(--border)" }}>
                      {["#", "Topic", "Consumers", "Penetration", "Engagement", "Freq (30d)", "Recency", "Score"].map(h => (
                        <th key={h} style={{ padding: "10px 12px", textAlign: "left", color: "var(--muted)", fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.8, whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredTopics.map((t, i) => (
                      <tr key={i} style={{ borderBottom: "1px solid #1a2030" }}>
                        <td style={{ padding: "8px 12px", color: "var(--muted)", fontSize: 11 }}>{i + 1}</td>
                        <td style={{ padding: "8px 12px", fontWeight: 500 }}>
                          <span style={{ color: "var(--accent)", fontSize: 10, marginRight: 6 }}>{t.category}</span>
                          <span style={{ color: "var(--text)" }}>{t.subcategory}</span>
                        </td>
                        <td style={{ padding: "8px 12px" }}>{fmt(t.consumers)}</td>
                        <td style={{ padding: "8px 12px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <div style={{ width: 60, height: 6, background: "#1e2736", borderRadius: 3, overflow: "hidden" }}>
                              <div style={{ width: `${Math.min(t.penetration, 100)}%`, height: "100%", background: "var(--accent)", borderRadius: 3 }} />
                            </div>
                            <span>{t.penetration}%</span>
                          </div>
                        </td>
                        <td style={{ padding: "8px 12px" }}>{t.avg_engagement.toFixed(3)}</td>
                        <td style={{ padding: "8px 12px" }}>{t.avg_frequency.toFixed(1)}</td>
                        <td style={{ padding: "8px 12px" }}>{t.avg_recency.toFixed(1)}d</td>
                        <td style={{ padding: "8px 12px" }}>
                          <span style={{
                            background: t.composite > 0.7 ? "#0f766e" : t.composite > 0.5 ? "#92400e" : "#1e293b",
                            color: t.composite > 0.5 ? "#fff" : "var(--muted)",
                            padding: "2px 8px", borderRadius: 10, fontSize: 11, fontWeight: 600
                          }}>{t.composite.toFixed(3)}</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* CATEGORIES TAB */}
        {tab === "categories" && (
          <div>
            <SectionTitle icon="📊">Category Penetration Overview</SectionTitle>
            <div style={{ background: "var(--card)", borderRadius: 12, border: "1px solid var(--border)", padding: 16 }}>
              <ResponsiveContainer width="100%" height={420}>
                <BarChart data={topCats} layout="vertical" margin={{ left: 140, right: 30, top: 5, bottom: 5 }}>
                  <XAxis type="number" tick={{ fill: "var(--muted)", fontSize: 10 }} tickFormatter={v => v + "%"} />
                  <YAxis type="category" dataKey="category" tick={{ fill: "var(--text)", fontSize: 11 }} width={135} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="penetration" name="Penetration %" radius={[0, 6, 6, 0]}>
                    {topCats.map((_, i) => <Cell key={i} fill={CAT_COLORS[i % CAT_COLORS.length]} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <SectionTitle icon="📋">Full Category Detail</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
              {categories.map((c, i) => (
                <div key={i} style={{
                  background: "var(--card)", borderRadius: 10, border: "1px solid var(--border)",
                  padding: "14px 16px", display: "flex", flexDirection: "column", gap: 6
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontWeight: 600, fontSize: 13 }}>{c.category}</span>
                    <span style={{
                      background: c.penetration > 30 ? "#0f766e" : c.penetration > 15 ? "#92400e" : "#1e293b",
                      color: c.penetration > 15 ? "#fff" : "var(--muted)",
                      padding: "2px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600
                    }}>{c.penetration}%</span>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--muted)" }}>
                    {fmt(c.consumers)} consumers · {c.subcats} subcategories · Eng: {c.avg_engagement.toFixed(3)}
                  </div>
                  <div style={{ width: "100%", height: 4, background: "#1e2736", borderRadius: 2, marginTop: 2 }}>
                    <div style={{ width: `${Math.min(c.penetration, 100)}%`, height: "100%", background: CAT_COLORS[i % CAT_COLORS.length], borderRadius: 2 }} />
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ height: 60 }} />
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
